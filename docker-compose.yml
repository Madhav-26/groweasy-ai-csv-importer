version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: groweasy_backend
    ports:
      - "5001:5001"
    environment:
      # Passes the Groq API key from your host to the container
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PORT=5001
    volumes:
      # Persists your SQLite database even if the container restarts
      - ./backend/prisma:/app/prisma
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: groweasy_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
